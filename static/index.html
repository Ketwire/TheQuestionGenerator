<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Question Generator</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
    <div class="container">
        <header style="background-color: lightskyblue"><h1>Question Generator</h1></header>
        <p>Welcome to your <em>Question Generator</em>.</p>
        <p>Please fill the form below.</p>
        <form action="/generate" method="post">
            <div>
                <label for="subject">Subject</label>
                <br>
                <select id="subject" name ="subject" required>
                    <option value="" disabled selected> Choose a subject </option>
                    <option value="math">Mathematics</option>
                    <option value="science">Science</option>
                    <option value="eng">English Language</option>
                    <option value="social_studies">Social Studies</option>
                    <option value="computing">Computing</option>
                    <option value="french">French Language</option>
                    <option value="bdt">Basic Design And Technology</option>
                </select>
            </div>
            <div>
                <label for="topic">Topic</label>
                <br>
                <input type="text" name="topic" id="topic" placeholder="e.g Algebraic Expressions">
            </div>
            <div>
                <label for="N_o">Number of questions</label>
                <br>
                <input type="number" name="N_o" id="N_o" min="1" max="20" value="5 required">
            </div>
            <button type="submit">Generate Questions</button>
        </form>

        <!-- RESULTS -->

        <footer style="background-color: lightskyblue">Built by Kayla Etwire</footer>

    </div>
    </body>
</html>
